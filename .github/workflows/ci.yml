name: CI

on:
  push:
    paths-ignore:
      - 'coverage.json'
  pull_request:
    paths-ignore:
      - 'coverage.json'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          coverage run -m behave
          coverage xml

      - name: Update coverage badge
        if: matrix.python-version == '3.12' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          coverage json -o cov.json
          python -c "
          import json
          with open('cov.json') as f:
              d = json.load(f)
          pct = round(d['totals']['percent_covered'])
          color = 'green' if pct >= 90 else 'yellow' if pct >= 70 else 'red'
          with open('coverage.json', 'w') as f:
              json.dump({'schemaVersion': 1, 'label': 'coverage', 'message': f'{pct}%', 'color': color}, f)
          "

      - name: Upload coverage badge file
        if: matrix.python-version == '3.12' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: coverage.json

  coverage-badge:
    runs-on: ubuntu-latest
    needs: release
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update to latest main
        run: git pull origin ${{ github.ref_name }} --rebase || true

      - uses: actions/download-artifact@v4
        with:
          name: coverage-badge

      - name: Commit and push coverage badge
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add coverage.json
          git diff --staged --quiet || (git commit -m "chore: update coverage badge [skip ci]" && git push)

  release:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref }}
      cancel-in-progress: false

    permissions:
      contents: write

    steps:
      - name: Checkout repository on release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Force release branch to workflow SHA
        run: git reset --hard ${{ github.sha }}

      - name: Semantic version release
        id: release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: "github-actions"
          git_committer_email: "actions@users.noreply.github.com"

      - name: Publish to GitHub Release assets
        if: steps.release.outputs.released == 'true'
        uses: python-semantic-release/publish-action@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release.outputs.tag }}

      - name: Upload distribution artifacts
        if: steps.release.outputs.released == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: distribution-artifacts
          path: dist

    outputs:
      released: ${{ steps.release.outputs.released || 'false' }}

  deploy:
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: distribution-artifacts
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true