<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Stripes: every-other pixel down, staggered columns</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 64px; height: 64px; overflow: hidden; background: #000; }
    canvas { display: block; width: 64px; height: 64px; }
  </style>
</head>
<body>
  <canvas id="c" width="64" height="64"></canvas>
  <script>
    (function() {
      var c = document.getElementById('c');
      var ctx = c.getContext('2d');
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, 64, 64);
      ctx.fillStyle = '#fff';
      for (var x = 0; x < 64; x += 2) {
        for (var y = 0; y < 64; y += 2) {
          ctx.fillRect(x, y, 1, 1);
        }
      }
    })();
  </script>
</body>
</html>
