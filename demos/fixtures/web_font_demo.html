<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixoo Web Font Demo</title>
  <style>
    @font-face {
      font-family: 'Tiny5Local';
      src: url('./fonts/Tiny5-Regular.ttf') format('truetype');
      font-display: block;
    }

    body {
      margin: 0;
      width: 64px;
      height: 64px;
      background: #000;
      color: #fff;
      overflow: hidden;
      position: relative;
      font-smooth: never;
      -webkit-font-smoothing: none;
      text-rendering: optimizeSpeed;
    }

    .label {
      position: absolute;
      left: 1px;
      top: 24px;
      font-family: 'Tiny5Local', monospace;
      font-size: 16px;
      line-height: 16px;
      letter-spacing: 0;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="label">WEB FONT</div>
</body>
</html>
