<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TinyText (192)</title>
  <style>
    @font-face {
      font-family: 'Tiny5';
      src: url('./fonts/Tiny5-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: block;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 192px;
      height: 192px;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: 'Tiny5', monospace;
      font-size: 23px;
      line-height: 1;
      -webkit-font-smoothing: none;
      -moz-osx-font-smoothing: unset;
      font-smooth: never;
      text-rendering: geometricPrecision;
    }

    #screen {
      width: 192px;
      height: 192px;
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
  <canvas id="screen" width="192" height="192" aria-label="TinyText screen"></canvas>
  <script>
    const PRESETS = {
      alphabet: [
        "ABCDEFGHIJKLM",
        "NOPQRSTUVWXYZ",
        "abcdefghijklm",
        "nopqrstuvwxyz",
      ],
      numbers: [
        "0123456789",
        "!@#$%^&*()",
        "+-=/.,<>?;':",
        "[ ] { }",
      ],
      alert: [
        "ALERT",
        "",
        "Check device",
        "status now.",
      ],
      warning: [
        "WARNING",
        "",
        "Low battery.",
        "Plug in soon.",
      ],
      success: [
        "OK",
        "",
        "All systems",
        "nominal.",
      ],
      info: [
        "INFO",
        "",
        "Pixoo 64",
        "64x64 px",
      ],
      custom: [
        "Hello",
        "Pixoo 64",
        "64x64 px",
      ],
    };

    const COLORS = {
      alphabet: { bg: "#000", fg: "#fff" },
      numbers: { bg: "#000", fg: "#aaa" },
      alert: { bg: "#200", fg: "#f66" },
      warning: { bg: "#330", fg: "#ff0" },
      success: { bg: "#030", fg: "#6f6" },
      info: { bg: "#003", fg: "#6af" },
      custom: { bg: "#111", fg: "#0f0" },
    };

    const LINE_YS_64 = [8, 22, 36, 50];
    const BASE_GAP_PX_64 = 1;
    const WORD_SPACE_PX_64 = 2;
    const START_X_64 = 2;
    const FONT_SPEC = "23px Tiny5";

    const params = new URLSearchParams(window.location.search);
    const variant = params.get("variant") || "alphabet";
    const tracking = Number.parseInt(params.get("tracking") || "0", 10);
    const trackingPx64 = Number.isFinite(tracking) ? Math.max(0, tracking) : 0;
    const lines = PRESETS[variant] || PRESETS.alphabet;
    const colors = COLORS[variant] || COLORS.alphabet;

    function hexToRgb(hex) {
      const v = hex.replace("#", "");
      const full = v.length === 3 ? v.split("").map((c) => c + c).join("") : v;
      return [
        parseInt(full.slice(0, 2), 16),
        parseInt(full.slice(2, 4), 16),
        parseInt(full.slice(4, 6), 16),
      ];
    }

    function toBinaryMask(ctx, width, height) {
      const data = ctx.getImageData(0, 0, width, height).data;
      let minX = width;
      let minY = height;
      let maxX = -1;
      let maxY = -1;

      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          const i = (y * width + x) * 4;
          if (data[i + 3] > 0) {
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x > maxX) maxX = x;
            if (y > maxY) maxY = y;
          }
        }
      }

      if (maxX < minX || maxY < minY) {
        return { width: 0, height: 0, offsetY: 0, mask: new Uint8Array(0) };
      }

      const outW = maxX - minX + 1;
      const outH = maxY - minY + 1;
      const mask = new Uint8Array(outW * outH);
      for (let y = 0; y < outH; y += 1) {
        for (let x = 0; x < outW; x += 1) {
          const sx = minX + x;
          const sy = minY + y;
          const i = (sy * width + sx) * 4;
          mask[y * outW + x] = data[i + 3] > 0 ? 1 : 0;
        }
      }
      return { width: outW, height: outH, offsetY: minY, mask };
    }

    function buildGlyphAtlas(linesToRender) {
      const charset = new Set();
      for (const line of linesToRender) {
        for (const ch of line) {
          if (ch !== " ") charset.add(ch);
        }
      }

      const hi = document.createElement("canvas");
      hi.width = 192;
      hi.height = 24;
      const hctx = hi.getContext("2d");
      hctx.font = FONT_SPEC;
      hctx.textBaseline = "top";
      hctx.fontKerning = "none";
      hctx.fillStyle = "#fff";

      const lo = document.createElement("canvas");
      lo.width = 64;
      lo.height = 8;
      const lctx = lo.getContext("2d");
      lctx.imageSmoothingEnabled = false;

      const atlas = new Map();
      for (const ch of charset) {
        hctx.clearRect(0, 0, hi.width, hi.height);
        hctx.fillText(ch, 0, -3);
        lctx.clearRect(0, 0, lo.width, lo.height);
        lctx.drawImage(hi, 0, 0, hi.width, hi.height, 0, 0, lo.width, lo.height);
        atlas.set(ch, toBinaryMask(lctx, lo.width, lo.height));
      }
      return atlas;
    }

    function renderLowRes(linesToRender, bgRgb, fgRgb) {
      const low = document.createElement("canvas");
      low.width = 64;
      low.height = 64;
      const lctx = low.getContext("2d", { alpha: false });
      lctx.imageSmoothingEnabled = false;
      lctx.fillStyle = `rgb(${bgRgb[0]},${bgRgb[1]},${bgRgb[2]})`;
      lctx.fillRect(0, 0, 64, 64);

      const atlas = buildGlyphAtlas(linesToRender);
      const img = lctx.getImageData(0, 0, 64, 64);
      const px = img.data;

      function setFg(x, y) {
        if (x < 0 || x >= 64 || y < 0 || y >= 64) return;
        const i = (y * 64 + x) * 4;
        px[i] = fgRgb[0];
        px[i + 1] = fgRgb[1];
        px[i + 2] = fgRgb[2];
        px[i + 3] = 255;
      }

      for (let li = 0; li < linesToRender.length && li < LINE_YS_64.length; li += 1) {
        const text = linesToRender[li] || " ";
        const baseY = LINE_YS_64[li];
        let x = START_X_64;
        for (const ch of text) {
          if (ch === " ") {
            x += WORD_SPACE_PX_64 + BASE_GAP_PX_64 + trackingPx64;
            continue;
          }
          const glyph = atlas.get(ch);
          if (!glyph || glyph.width === 0 || glyph.height === 0) {
            x += BASE_GAP_PX_64 + trackingPx64;
            continue;
          }
          for (let gy = 0; gy < glyph.height; gy += 1) {
            for (let gx = 0; gx < glyph.width; gx += 1) {
              if (glyph.mask[gy * glyph.width + gx]) {
                setFg(x + gx, baseY + glyph.offsetY + gy);
              }
            }
          }
          x += glyph.width + BASE_GAP_PX_64 + trackingPx64;
        }
      }

      lctx.putImageData(img, 0, 0);
      return low;
    }

    async function ensureTiny5Loaded() {
      if (!document.fonts || !document.fonts.load) {
        return;
      }
      await document.fonts.load(FONT_SPEC);
      await document.fonts.ready;
      for (let i = 0; i < 20; i += 1) {
        if (document.fonts.check(FONT_SPEC)) {
          return;
        }
        await new Promise((resolve) => setTimeout(resolve, 50));
      }
    }

    async function render() {
      await ensureTiny5Loaded();
      const bgRgb = hexToRgb(colors.bg);
      const fgRgb = hexToRgb(colors.fg);
      const low = renderLowRes(lines, bgRgb, fgRgb);

      document.body.style.background = colors.bg;
      const screen = document.getElementById("screen");
      const sctx = screen.getContext("2d", { alpha: false });
      sctx.imageSmoothingEnabled = false;
      sctx.fillStyle = colors.bg;
      sctx.fillRect(0, 0, 192, 192);
      sctx.drawImage(low, 0, 0, 64, 64, 0, 0, 192, 192);
    }

    render();
  </script>
</body>
</html>
