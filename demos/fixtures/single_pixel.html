<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Single pixel (0,0)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 64px; height: 64px; overflow: hidden; background: #000; }
    .pixel {
      position: absolute;
      left: 0;
      top: 0;
      width: 1px;
      height: 1px;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="pixel"></div>
</body>
</html>
